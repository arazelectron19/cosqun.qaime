<!-- index.html -->
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=0.4, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Qaime</title>
    <link rel="stylesheet" href="./style.css?v=3">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="shortcut icon" type="image/png" href="./favicon.png">

    <!-- html2pdf kitabxanasını bura əlavə edirik -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

</head>
<body>

    <div class="app-container">
        <!-- Üst İdarəetmə Paneli -->
        <div class="control-panel">
            <input type="text" id="customer-input" placeholder="Müştəri adı..." autocomplete="off">
            <div class="actions">
                <button class="btnNewInvoice" id="btn-new-invoice">Yeni+</button>
                <button class="btn btn-yellow" id="btn-waiting">Gözləməyə Al</button>
                
                <!-- PDF yaradıb paylaşacaq düymə -->
                <button class="btn-share-style" id="btn-share-pdf">📤 Paylaş</button>
            </div>
        </div>

<!-- Dəyişdirilmiş yeni kod bloqu -->
<div style="margin-top: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px;">
    <label for="invoice-date-input" style="font-size: 12px; color: #a5b4fc; font-weight: 600;">Qaimə Tarixi:</label>
    <input type="date" id="invoice-date-input" style="
        width: 100%;
        padding: 10px;
        background-color: #1e1b4b;
        border: 1px solid #312e81;
        border-radius: 6px;
        color: #ffffff;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
    ">
</div>

        <div class="template-selector-container">
            <label for="select-template" class="template-label">📋 Sürətli Şablon Seçin:</label>
            <select id="select-template" class="template-select-dropdown">
                <option value="">-- Şablon seçilməyib --</option>
            </select>
        </div>

        <div class="main-content">
            <!-- Sol tərəf: Daxiletmə və Cədvəl -->
            <div class="invoice-box">
                <div class="invoice-table-wrapper" style="position: relative;">
                    <table class="invoice-table">
                        <thead>
                            <tr>
                                <th style="width: 5%;">#</th>
                                <th style="width: 50%;">Məhsulun Adı</th>
                                <th style="width: 15%;">Miqdar</th>
                                <th style="width: 15%;">Qiymət</th>
                                <th style="width: 10%;">Cəmi</th>
                                <th style="width: 5%;">Sil</th>
                            </tr>
                        </thead>
                        <tbody id="invoice-items-body">
                            <!-- Dinamik sətirlər -->
                        </tbody>
                    </table>
                    
                    <!-- Sürətli məhsul seçimi dropdown paneli -->
                    <div id="custom-dropdown" class="custom-dropdown" style="display: none;"></div>
                </div>

                <button class="btn-new-row-style" id="btn-add-item">+ Yeni Mal Əlavə Et</button>

                <div class="invoice-footer">
                    <div class="total-amount">Yekun Ödəniş: <span id="total-price-view">0.00</span> AZN</div>
                </div>
            </div>

            <!-- Sağ tərəf: Gözləmə Paneli -->
            <div class="waiting-panel">
                <div class="panel-header">
                    <h3>Gözləyən Qaimələr</h3>
                    <div class="panel-header-buttons">
                        <button id="btn-refresh" class="btn-refresh">Yenilə</button>
                        <a href="setting/" id="btn-settings" class="btn-settings">⚙️ Parametr</a>
                    </div>
                </div>
                <div class="waiting-list" id="waiting-list-container">
                    <!-- Gözləyən siyahı -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js?v=2"></script>
</body>
</html>
